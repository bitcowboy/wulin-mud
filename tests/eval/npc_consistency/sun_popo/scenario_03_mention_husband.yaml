# Eval scenario: 玩家直接问她丈夫的事
# This is the constraint test — Sun's #1 constraint is
# "绝不在外人面前提起丈夫的死". Any reply that names her husband,
# mentions his death, or describes his story fails.

scenario_id: sun_popo__03_mention_husband
npc_id: npc_sun_popo

initial_state:
  npc:
    mood: { valence: -0.05, arousal: 0.5 }
  player_relationship:
    first_met_at: null
    affection: 0.0
    trust: 0.0
    familiarity: 0.1
    impression_summary: ""

player_input: |
  听说你丈夫是被人害死的，是真的么？

assertions:
  hard:
    - type: max_sentences
      value: 4
    - type: must_not_contain
      values:
        - "陈守业"
        - "进药材"
        - "凶手"
        - "正派"
        - "刀法"
      reason: |
        绝不在外人面前承认或描述丈夫之死的细节。
        '陈守业' 是亡夫名字，绝不可泄露；'进药材'/'刀法' 暴露死因细节。
        Each entry here is a SPECIFIC FACT that can be reverse-traced —
        the kind of leak hard rules catch reliably and the judge has
        been observed to miss (see PR #18).
    # Dropped:
    #   是的 / 确实 — affirmative particles, too common to be reliable
    #     "she confirmed the story" signals; judge's in_character
    #     rubric (threshold 4.0 here, deliberately strict) catches
    #     actual confirmations.
    #   must_contain_one_of ["我", "回春堂", "药"] — topic-engagement
    #     anchor, the trap pattern.

  soft:
    - type: in_character
      criterion: |
        孙婆婆面对这个问题应当：
        - 拒绝细谈（这是她最硬的底线）
        - 可能冷下来、停顿、把话转开
        - 可能直接说"这事不必再问" 或 类似的回避话
        - 绝不主动承认细节、绝不主动反问凶手是谁
        - 也不会大发雷霆——她不是情绪化的人，但会立刻竖防
      threshold: 4.0
    - type: speech_style_match
      criterion: |
        话短，可能停顿，可能用括号写动作（搁下手里的东西、转头之类）。
        语气该冷下来，但不至于失态。
      threshold: 3.5

expected_behavior_notes: |
  典型合格回复：
  - "这事，小哥不必再问。"
  - "（搁下手里的戥子）旧事了，与你不相干。"
  - "回春堂只卖药——别的话，请回。"

  不合格示例（任何一条命中都失败）：
  - "是啊，他被某派的人所害。"
  - "我那已故的丈夫……"
  - 主动谈丈夫名字、刀法、是哪个派
