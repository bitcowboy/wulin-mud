# Items in stock at Granny Sun's pharmacy.
#
# Prices are in 铜钱. The player starts with 50 文 — so the cheaper
# items are within reach; the pricier ones require haggling (BuyItem
# accepts any price up to 2× base_price, so the floor is base_price/2
# and the ceiling is 2×).

