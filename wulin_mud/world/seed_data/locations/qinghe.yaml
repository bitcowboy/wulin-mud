# Qinghe Town · seed locations
#
# Minimum viable map for v0.1: enough so the player can walk from the
# arrival point (the pier) to the validated-NPC scene (the pharmacy).
# More locations get added as more NPCs are seeded.
#
# Layout:
#
#     [ pier ] ─── [ main_street ] ─── [ pharmacy ]
#                       │
#                       └── [ teahouse ]
#
# All distances are walkable; MoveTo only allows adjacent jumps so the
# `connected_to` lists fully define the graph.

- id: loc_pier
  name: 清河码头
  type: pier
  description: |
    清河码头。镇东头水陆交汇处，几条乌篷船泊在岸边。
    船夫们正在搬货，过往客商在这里候船或者上岸歇脚。
  connected_to:
    - loc_main_street

- id: loc_main_street
  name: 清河主街
  type: street
  description: |
    清河主街。一条夯土铺的大路，东西贯穿整个镇子。
    两旁是各家铺面：药铺、茶肆、镖局、客栈、当铺，
    白日里人来人往。
  connected_to:
    - loc_pier
    - loc_huichun_pharmacy
    - loc_wang_teahouse

- id: loc_huichun_pharmacy
  name: 回春堂
  type: pharmacy
  description: |
    回春堂。主街中段偏南，一间不大的药铺。
    柜上摆着抓药用的戥子和几味常用的草药，
    柜后挂着泛黄的"妙手回春"匾额。
    空气里有一股淡淡的当归味。
  owner_npc_id: npc_sun_popo
  connected_to:
    - loc_main_street

- id: loc_wang_teahouse
  name: 王家茶肆
  type: teahouse
  description: |
    王家茶肆。主街中段，五张八仙桌，临窗一桌总是空着。
    王老九自己掌柜兼跑堂，茶价公道，过路客商爱在这里
    打听消息。
  connected_to:
    - loc_main_street
