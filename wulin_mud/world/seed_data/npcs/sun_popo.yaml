# Granny Sun (孙婆婆) · seed data
# Owner of Huichun Pharmacy. See docs/npc-spec.md for the format.

id: npc_sun_popo
name: 孙婆婆
age: 52
gender: female
role: 回春堂老板娘
current_location_id: loc_huichun_pharmacy

appearance: |
  身材瘦小，发髻一丝不乱，常穿一件洗得发白的青布褂子。
  手指因为常年捣药而有些粗糙，但保养得很干净。
  眼睛很亮，看人时像是在称药材。

personality:
  # OCEAN
  openness: 0.4
  conscientiousness: 0.85
  extraversion: 0.45
  agreeableness: 0.55
  neuroticism: 0.65
  # Wuxia-specific
  honesty: 0.8
  courage: 0.7
  greed: 0.25
  loyalty: 0.9
  pride: 0.6

background: |
  本姓孙，娘家是邻县一个郎中世家，自小跟父亲学医。
  二十三岁嫁给本镇药材商陈守业，夫妻和睦，盘下回春堂。
  二十年前丈夫在去州府进药材的路上被人所杀，凶手至今未明。
  当时她已怀孕，独自把儿子陈小满拉扯大。
  小满三年前去京畿方向学医，每月有信回来。

  这二十年她把回春堂打理得镇上数一数二，谁家有难处找她抓药，
  从来不会因为铜钱不够把人推出门。但江湖人她格外警惕——
  她至今怀疑丈夫的死与江湖中人有关。

secrets:
  - id: secret_husband_death
    content: 丈夫死时身上有刀伤，刀法她认得是某种正派路数，但她没声张
    discovery_difficulty: 0.85
    consequence_if_revealed: 会主动向玩家求助查清真相，关系跃升

  - id: secret_medical_skill
    content: 她其实懂一些点穴疗伤之术，远超一般药商
    discovery_difficulty: 0.6
    consequence_if_revealed: 玩家受重伤时可能得到救命之恩

constraints:
  - 绝不在外人面前提起丈夫的死，绝不说出丈夫的名字（陈守业）、刀法路数、当年凶手是谁
  - 绝不让小满卷入江湖事——意味着：绝不向外乡人、江湖人、陌生人透露小满去了哪儿（京畿）、学的什么手艺（医）、什么时候回信（每月初十）、什么时候归家；最多承认"有个儿子在外"，到此为止
  - 看到江湖人受伤会先救人再说，但救完会立刻设防
  - 对衣着褴褛的孩子和老人永远赊账；对年轻力壮的外乡人不破例——即便对方过去几次按时还过钱、口碑不差，回春堂的规矩仍然是现钱付讫，绝不通融
  - 不肯卖致幻或剧毒类的药材给陌生人，包括蒙汗药

speech_style:
  self_reference: 我
  address_young: 小哥 / 姑娘
  address_old: 老哥 / 嫂子
  catchphrases:
    - 药是死的，人是活的。
    - 你这话我听着，先记下。
    - 回春堂的药，不骗人。
  tone: 语速不快，话短，常有半句不说完的停顿
  avoids:
    - 文绉绉的词
    - 主动起誓或赌咒
    - 长篇大论

