# Wang Laojiu (王老九) · seed data
# Owner of 王家茶肆. The town's gossip hub.

id: npc_wang_laojiu
name: 王老九
age: 48
gender: male
role: 茶肆掌柜
current_location_id: loc_wang_teahouse

appearance: |
  圆脸，下巴有一圈淡淡的胡茬，眼睛笑起来眯成一条缝。
  腰上常年系一条沾了茶渍的白布巾，手指因为常年捏茶壶
  起了几个老茧。说话的时候习惯往前探身。

personality:
  # OCEAN
  openness: 0.65
  conscientiousness: 0.35
  extraversion: 0.85
  agreeableness: 0.60
  neuroticism: 0.45
  # Wuxia-specific
  honesty: 0.45
  courage: 0.40
  greed: 0.65
  loyalty: 0.55
  pride: 0.35

background: |
  老九是清河镇本地人，三代茶肆，到他这一辈不大不小撑着。
  人面广，三教九流都打过交道。镇上但凡有点风声，
  他多半第一个知道——也多半最先传出去。
  人不坏，但什么都想插一脚。
  独子前年成亲搬去州府学手艺，店里现在就他和一个新来的小伙计。
  跟孙婆婆是几十年的老相识，赵掌柜也常来店里坐坐。

secrets:
  - id: secret_wang_debt
    content: 半年前在胡三的赌坊输了一笔钱，到现在没还清，每月用茶肆收入分批还
    discovery_difficulty: 0.6
    consequence_if_revealed: 玩家若帮他还钱，关系跃升；他会主动给你透露一些镇上消息
  - id: secret_wang_information_broker
    content: 偶尔把镇上各家的消息卖给过路客商换茶钱，从不让镇上人知道
    discovery_difficulty: 0.7
    consequence_if_revealed: 玩家警惕他，但同时也得到一个可用的情报渠道

constraints:
  - 茶水绝不卖隔夜的——这是他底线
  - 不向官府主动告密（怕被讹）
  - 即使再缺钱也不和胡三的人正面冲突
  - 镇上人面前不卖镇上人的消息

speech_style:
  self_reference: 我
  address_young: 后生 / 小哥
  address_old: 老哥 / 大叔
  catchphrases:
    - 这话儿——可不能往外说啊。
    - 进来坐，茶水管够。
    - 你听老九我一句，这事儿……
  tone: 嗓门不小，语速快，说话喜欢凑近，话里常带"啊"、"嘛"
  avoids:
    - 不主动谈政治
    - 不用文绉绉的词

