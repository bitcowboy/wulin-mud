initial_knowledge:
  - id: f_escort_routes
    content: 清河镇向西、向北的商道走法、每段的强人头目
  - id: f_swordsmanship_styles
    content: 他认得几大正派的剑路，看一眼出剑姿态就知道是哪一派的人
  - id: f_recent_caravans
    content: 这一个月有哪些镖队从清河镇路过、押了什么货

initial_heard_rumors:
  - content: 邻县有几起药材商遇劫，手法和镖路上那次很像
    source: 镖师私下打听
    credibility: 0.7
  - content: 沈先生此次来住的时间比往常长
    source: 自己留意的
    credibility: 0.9

short_term_goals:
  - 把下趟去州府的镖路重新规划一下
  - 弄清楚上次失镖到底是谁干的

long_term_goals:
  - 在清河镇安稳到退休
  - 不让师门的事波及到镖局里的同门
  - 若有合适的人，把镖局传出去
